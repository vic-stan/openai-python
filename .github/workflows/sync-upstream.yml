name: Sync upstream releases

on:
  schedule:
    - cron: "0 6 * * *" # Daily at 06:00 UTC
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.FORK_RELEASE_TOKEN || github.token }}

      - name: Get latest upstream release tag
        id: upstream
        run: |
          LATEST=$(git ls-remote --tags https://github.com/openai/openai-python.git \
            | awk '{print $2}' \
            | grep -E '^refs/tags/v[0-9]+\.[0-9]+\.[0-9]+$' \
            | sed 's|refs/tags/||' \
            | sort -V \
            | tail -1)
          echo "tag=$LATEST" >> "$GITHUB_OUTPUT"
          echo "Latest upstream release: $LATEST"

      - name: Check if release already exists on fork
        id: check
        env:
          GH_TOKEN: ${{ secrets.FORK_RELEASE_TOKEN || github.token }}
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"
          if gh release view "$TAG" --repo "${{ github.repository }}" &>/dev/null; then
            echo "release_exists=true" >> "$GITHUB_OUTPUT"
            echo "Release $TAG already exists on fork, nothing to do."
          else
            echo "release_exists=false" >> "$GITHUB_OUTPUT"
            echo "Release $TAG not found on fork, proceeding."
          fi

      - name: Fetch upstream tag
        if: steps.check.outputs.release_exists == 'false'
        run: |
          git fetch https://github.com/openai/openai-python.git \
            "refs/tags/${{ steps.upstream.outputs.tag }}:refs/tags/${{ steps.upstream.outputs.tag }}"

      - name: Check if tag already in branch history
        id: merged
        if: steps.check.outputs.release_exists == 'false'
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"
          if git merge-base --is-ancestor "$TAG" HEAD 2>/dev/null; then
            echo "merged=true" >> "$GITHUB_OUTPUT"
            echo "$TAG is already in branch history, skipping merge."
          else
            echo "merged=false" >> "$GITHUB_OUTPUT"
            echo "$TAG is not yet in branch history, will merge."
          fi

      - name: Merge upstream release
        if: steps.check.outputs.release_exists == 'false' && steps.merged.outputs.merged == 'false'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          TAG="${{ steps.upstream.outputs.tag }}"
          if ! git merge "$TAG" --no-edit -m "chore: merge upstream release $TAG [skip ci]"; then
            git merge --abort
            echo ""
            echo "❌ Merge conflict with $TAG — resolve it locally:"
            echo ""
            echo "  git fetch https://github.com/openai/openai-python.git refs/tags/${TAG}:refs/tags/${TAG}"
            echo "  git merge ${TAG}"
            echo "  # fix conflicts, then:"
            echo "  git push origin main"
            echo ""
            exit 1
          fi

      - name: Push
        if: steps.check.outputs.release_exists == 'false' && steps.merged.outputs.merged == 'false'
        run: git push origin main "${{ steps.upstream.outputs.tag }}"

      - name: Fetch upstream release notes
        if: steps.check.outputs.release_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.FORK_RELEASE_TOKEN || github.token }}
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"
          gh release view "$TAG" --repo openai/openai-python --json body -q .body > release_notes.md 2>/dev/null || echo "" > release_notes.md

      - name: Create release
        if: steps.check.outputs.release_exists == 'false'
        env:
          GH_TOKEN: ${{ secrets.FORK_RELEASE_TOKEN || github.token }}
        run: |
          TAG="${{ steps.upstream.outputs.tag }}"
          TARGET_SHA="$(git rev-list -n 1 "$TAG")"
          export TAG TARGET_SHA
          python - <<'PY' > release_payload.json
          import json
          import os

          tag = os.environ["TAG"]
          target_sha = os.environ["TARGET_SHA"]
          with open("release_notes.md", "r", encoding="utf-8") as f:
              body = f.read()

          print(
              json.dumps(
                  {
                      "tag_name": tag,
                      "target_commitish": target_sha,
                      "name": tag,
                      "body": body,
                  }
              )
          )
          PY
          gh api --method POST "repos/${{ github.repository }}/releases" --input release_payload.json
